<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Travel Intelligence</title>
<style>
:root{--bg:#E9EDF5;--surface:#F8FAFE;--card:#fff;--text:#1F1F1F;--muted:#747775;--divider:rgba(0,0,0,.08);--primary:#1A73E8;--primary-soft:#E8F0FE;--accent:#3DE1D1;--shadow:0 18px 45px rgba(31,41,55,.10)}
body.dark{--bg:#080B11;--surface:#0D1118;--card:#121822;--text:#F5F7FB;--muted:#97A1B4;--divider:rgba(255,255,255,.11);--primary:#9E77FF;--primary-soft:rgba(158,119,255,.18);--accent:#3DE1D1;--shadow:0 18px 45px rgba(0,0,0,.30)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at 15% 10%,rgba(26,115,232,.16),transparent 30%),radial-gradient(circle at 85% 15%,rgba(61,225,209,.14),transparent 30%),var(--bg);color:var(--text);min-height:100vh;padding:24px}
.app{max-width:1180px;margin:0 auto}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.brand{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}.toggle{border:1px solid var(--divider);background:var(--card);color:var(--text);padding:10px 14px;border-radius:999px;cursor:pointer}.shell{background:rgba(248,250,254,.78);border:1px solid var(--divider);border-radius:34px;box-shadow:var(--shadow);overflow:hidden}body.dark .shell{background:rgba(13,17,24,.82)}
.hero{padding:34px 34px 22px}.kicker{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;margin-bottom:8px}h1{font-size:46px;line-height:1.02;letter-spacing:-.04em;margin-bottom:12px}.summary{font-size:16px;line-height:1.7;color:var(--muted);max-width:760px}.tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:18px}.tag{font-size:12px;font-weight:700;color:var(--primary);background:var(--primary-soft);padding:8px 13px;border-radius:999px}
.intel{margin-top:22px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.intel-card{background:var(--card);border:1px solid var(--divider);border-radius:18px;padding:14px}.intel-label{font-size:11px;color:var(--muted);margin-bottom:4px}.intel-value{font-size:14px;font-weight:700}
.layout{display:grid;grid-template-columns:minmax(0,680px) minmax(320px,1fr);gap:22px;padding:0 34px 24px}.section-label{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin:14px 0}.stops{display:grid;gap:14px}.stop{display:grid;grid-template-columns:70px 1fr;gap:14px;background:var(--card);border:1px solid var(--divider);border-radius:24px;padding:18px;animation:rise .7s both}@keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}.time{font-weight:800;color:var(--primary)}.visual{height:160px;border-radius:18px;background:linear-gradient(135deg,var(--primary-soft),rgba(61,225,209,.20));margin-bottom:14px;display:flex;align-items:flex-end;padding:14px;color:var(--text);font-weight:800}.stop h3{font-size:19px;margin-bottom:6px}.cat{display:inline-flex;background:var(--primary-soft);color:var(--primary);font-size:11px;font-weight:800;border-radius:999px;padding:5px 9px;margin-bottom:8px}.copy,.fit,.booking{font-size:13px;line-height:1.6;color:var(--muted);margin-top:6px}.fit strong,.booking strong{color:var(--text)}.delete{display:none;margin-top:10px;border:1px solid rgba(217,48,37,.25);background:rgba(217,48,37,.08);color:#D93025;border-radius:999px;padding:8px 10px;cursor:pointer}.editing .delete{display:inline-flex}.add{display:none;background:var(--card);border:1px dashed var(--primary);border-radius:24px;padding:16px;margin-top:14px}.editing .add{display:block}.add input,.add textarea{width:100%;border:1px solid var(--divider);background:var(--surface);color:var(--text);border-radius:14px;padding:12px;margin-bottom:8px}
.map{position:sticky;top:24px;background:var(--card);border:1px solid var(--divider);border-radius:28px;overflow:hidden;box-shadow:var(--shadow)}.map-art{height:260px;background:radial-gradient(circle at 20% 25%,rgba(26,115,232,.20),transparent 25%),radial-gradient(circle at 75% 65%,rgba(61,225,209,.18),transparent 25%),linear-gradient(135deg,var(--surface),var(--card));position:relative}.route{position:absolute;inset:50px}.route svg{width:100%;height:100%}.pin{position:absolute;width:28px;height:28px;border-radius:50% 50% 50% 0;background:var(--primary);transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:800}.pin span{transform:rotate(45deg)}.p1{left:18%;top:24%}.p2{left:47%;top:42%}.p3{left:70%;top:64%}.map-body{padding:18px}.route-row{display:flex;justify-content:space-between;gap:10px;border-top:1px solid var(--divider);padding-top:10px;margin-top:10px;font-size:12px;color:var(--muted)}.route-row strong{color:var(--text)}
.actions{display:flex;justify-content:flex-end;gap:10px;padding:0 34px 34px}button.primary,button.secondary{border:none;border-radius:999px;padding:14px 22px;font-weight:800;cursor:pointer}button.primary{background:var(--primary);color:white}button.secondary{background:var(--card);color:var(--text);border:1px solid var(--divider)}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;padding:20px}.modal.open{display:flex}.modal-card{background:var(--card);color:var(--text);max-width:560px;border-radius:28px;padding:26px;box-shadow:var(--shadow)}.modal-card h2{font-size:30px;line-height:1.05;margin-bottom:10px}.res-card{border:1px solid var(--divider);border-radius:18px;padding:14px;margin-top:10px}
@media(max-width:800px){body{padding:12px}.hero{padding:24px}.layout{display:block;padding:0 24px 24px}.intel{grid-template-columns:1fr 1fr}h1{font-size:36px}.stop{grid-template-columns:1fr}.map{position:relative;top:auto;margin-top:18px}.actions{flex-direction:column;padding:0 24px 24px}.actions button{width:100%}}
</style>
</head>
<body>
<div class="app"><div class="top"><div class="brand">Gemini Travel Intelligence</div><button class="toggle" onclick="document.body.classList.toggle('dark')">Toggle mode</button></div><main class="shell" id="shell"><section class="hero"><div class="kicker" id="dateMood"></div><h1 id="title"></h1><p class="summary" id="summary"></p><div class="tags" id="tags"></div><div class="intel" id="intel"></div></section><section class="layout"><div><div class="section-label">Today's itinerary</div><div class="stops" id="stops"></div><div class="add" id="addForm"><input id="newTime" placeholder="Time"><input id="newName" placeholder="Place name"><input id="newCat" placeholder="Category"><textarea id="newNote" placeholder="Why this fits"></textarea><button class="secondary" onclick="addStop()">Add stop</button></div></div><aside class="map"><div class="map-art"><div class="route"><svg viewBox="0 0 320 190" fill="none"><path d="M48 58 C92 34, 128 96, 166 83 C214 67, 218 142, 272 130" stroke="var(--primary)" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 10"/></svg></div><div class="pin p1"><span>1</span></div><div class="pin p2"><span>2</span></div><div class="pin p3"><span>3</span></div></div><div class="map-body"><h3>Route preview</h3><p class="copy">Static route visualization with estimated travel between stops.</p><div id="routeRows"></div></div></aside></section><section class="actions"><button class="secondary" onclick="toggleEdit()">Edit</button><button class="primary" onclick="openSuccess()">I like it</button></section></main></div><div class="modal" id="modal" onclick="if(event.target.id==='modal')closeSuccess()"><div class="modal-card"><h2>Your itinerary has been added to your calendar and Gemini has booked reservations.</h2><p class="copy">Prototype confirmation for calendar and reservation actions.</p><div id="reservations"></div><div style="display:flex;justify-content:flex-end;margin-top:18px"><button class="primary" onclick="closeSuccess()">Close</button></div></div></div>
<script>
const itinerary={destination:"Dallas",dateLabel:"Saturday",mood:"Hidden gems",intent:"Vegetarian-friendly food, aesthetic places, not too touristy",summary:"A local-feeling Dallas day built around independent cafés, neighborhood art, vegetarian-friendly food, and a skyline finish.",personalization:{pace:"Medium",novelty:"Hidden gems",food:"High",touristTolerance:"Low"},stops:[{time:"9:30 AM",name:"The Wild Detectives",category:"Coffee + books",description:"Start with coffee in an independent bookstore café that feels local and creative.",fit:"Matches hidden gems, aesthetic atmosphere, and a slower creative start.",visual:"Coffee",booking:"No booking needed",travel:"7 min walk · 0.4 mi"},{time:"11:00 AM",name:"Bishop Arts District",category:"Neighborhood walk",description:"Browse murals, small shops, and local streets without feeling trapped in a tourist checklist.",fit:"Aesthetic, walkable, and local-feeling with flexible food options nearby.",visual:"Hidden gem",booking:"No booking needed",travel:"12 min drive · 4.3 mi"},{time:"1:00 PM",name:"Dallas Farmers Market",category:"Vegetarian-friendly lunch",description:"Use the market as a flexible lunch stop with multiple vegetarian-friendly options.",fit:"High food variety makes it easier to satisfy vegetarian needs without overplanning.",visual:"Food",booking:"No booking needed",travel:"8 min drive · 2.1 mi"}],route:[{from:"The Wild Detectives",to:"Bishop Arts District",distance:"0.4 mi",duration:"7 min walk"},{from:"Bishop Arts District",to:"Dallas Farmers Market",distance:"4.3 mi",duration:"12 min drive"}],bookableMoments:[{provider:"Google Calendar",title:"Full itinerary added",description:"All stops were added with travel buffers."}]};
let editing=false;function render(){dateMood.textContent=`${itinerary.dateLabel} · ${itinerary.mood}`;title.textContent=`${itinerary.destination}, designed around you.`;summary.textContent=itinerary.summary;tags.innerHTML=[itinerary.intent,itinerary.mood,"Personalized"].map(t=>`<span class="tag">${t}</span>`).join("");intel.innerHTML=Object.entries(itinerary.personalization).map(([k,v])=>`<div class="intel-card"><div class="intel-label">${k}</div><div class="intel-value">${v}</div></div>`).join("");stops.innerHTML=itinerary.stops.map((s,i)=>`<article class="stop" style="animation-delay:${i*.12}s"><div class="time">${s.time}</div><div><div class="visual">${s.visual}</div><h3>${s.name}</h3><span class="cat">${s.category}</span><p class="copy">${s.description}</p><p class="fit"><strong>Why this fits:</strong> ${s.fit}</p><p class="booking"><strong>${s.booking}</strong> · ${s.travel}</p><button class="delete" onclick="deleteStop(${i})">Delete stop</button></div></article>`).join("");routeRows.innerHTML=itinerary.route.map(r=>`<div class="route-row"><span><strong>${r.from}</strong><br>to ${r.to}</span><span>${r.distance}<br>${r.duration}</span></div>`).join("")}function toggleEdit(){editing=!editing;shell.classList.toggle("editing",editing)}function deleteStop(i){itinerary.stops.splice(i,1);render()}function addStop(){if(!newTime.value||!newName.value)return;itinerary.stops.push({time:newTime.value,name:newName.value,category:newCat.value||"Custom",description:newNote.value||"Custom stop added by the user.",fit:"Added during edit mode.",visual:newCat.value||"Custom",booking:"Check availability",travel:"TBD"});newTime.value=newName.value=newCat.value=newNote.value="";render()}function openSuccess(){reservations.innerHTML=itinerary.bookableMoments.map(r=>`<div class="res-card"><strong>${r.provider}</strong><h3>${r.title}</h3><p class="copy">${r.description}</p></div>`).join("");modal.classList.add("open")}function closeSuccess(){modal.classList.remove("open")}render();
</script>
</body>
</html>
